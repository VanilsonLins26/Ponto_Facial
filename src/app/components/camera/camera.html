<div class="camera-container">
  @if (!modelsLoaded) {
    <div class="loading">
      {{ loadError ? loadError : 'Carregando inteligência artificial...' }}
    </div>
  } @else {
    @if (!stream) {
      <button class="btn-primary" (click)="startCamera()">Ativar Câmera</button>
    }
    
    <div class="video-wrapper" [style.display]="stream ? 'block' : 'none'">
      <video #videoElement autoplay muted playsinline (play)="onVideoPlay()"></video>
      <canvas #canvasElement></canvas>
      <div class="camera-overlay">
        <div class="camera-guide" [class.face-detected]="isFaceCentered"></div>
      </div>
    </div>
  }
</div>
